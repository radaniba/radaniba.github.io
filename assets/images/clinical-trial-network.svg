<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" role="img" aria-label="Clinical trial network">
  <defs>
    <linearGradient id="ctn-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#161618"/>
      <stop offset="100%" stop-color="#0d0d0f"/>
    </linearGradient>
    <radialGradient id="ctn-hub" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ed1c24"/>
      <stop offset="100%" stop-color="#9c0e14"/>
    </radialGradient>
    <filter id="ctn-shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="14" stdDeviation="22" flood-color="#000" flood-opacity="0.45"/>
    </filter>
    <filter id="ctn-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="14"/>
    </filter>
  </defs>

  <rect x="20" y="20" width="760" height="460" rx="20" fill="url(#ctn-bg)" stroke="#26262a" stroke-width="1" filter="url(#ctn-shadow)"/>

  <g transform="translate(400,260)" font-family="'Public Sans', sans-serif">
    <!-- Hub glow -->
    <circle cx="0" cy="0" r="120" fill="#ed1c24" opacity="0.18" filter="url(#ctn-glow)"/>

    <!-- Connection lines -->
    <g stroke="#3a3a40" stroke-width="1.2" fill="none">
      <line x1="0" y1="0" x2="-240" y2="-160"/>
      <line x1="0" y1="0" x2="-280" y2="0"/>
      <line x1="0" y1="0" x2="-220" y2="160"/>
      <line x1="0" y1="0" x2="0" y2="-200"/>
      <line x1="0" y1="0" x2="180" y2="-180"/>
      <line x1="0" y1="0" x2="280" y2="-30"/>
      <line x1="0" y1="0" x2="240" y2="140"/>
      <line x1="0" y1="0" x2="0" y2="200"/>
      <line x1="0" y1="0" x2="-100" y2="200"/>
      <line x1="0" y1="0" x2="100" y2="200"/>
    </g>

    <!-- Pulses on lines -->
    <g fill="#ed1c24">
      <circle cx="-100" cy="-66" r="3"><animate attributeName="opacity" values="0;1;0" dur="2.4s" repeatCount="indefinite"/></circle>
      <circle cx="120" cy="-120" r="3"><animate attributeName="opacity" values="0;1;0" dur="2.8s" begin="0.8s" repeatCount="indefinite"/></circle>
      <circle cx="180" cy="-20" r="3"><animate attributeName="opacity" values="0;1;0" dur="3.0s" begin="1.2s" repeatCount="indefinite"/></circle>
      <circle cx="-140" cy="80" r="3"><animate attributeName="opacity" values="0;1;0" dur="3.2s" begin="0.4s" repeatCount="indefinite"/></circle>
    </g>

    <!-- Hub -->
    <circle cx="0" cy="0" r="56" fill="url(#ctn-hub)" stroke="#fff" stroke-width="2" stroke-opacity="0.16"/>
    <text x="0" y="-2" text-anchor="middle" font-size="11" font-weight="700" fill="#fff" letter-spacing="0.12em">MAESTRO</text>
    <text x="0" y="14" text-anchor="middle" font-size="9" fill="#fff" opacity="0.85" letter-spacing="0.08em">CORE</text>

    <!-- Outer site nodes -->
    <g font-size="10" font-weight="600" fill="#cfcfd2">
      <g transform="translate(-240,-160)">
        <circle cx="0" cy="0" r="22" fill="#1a1a1d" stroke="#26262a"/>
        <text x="0" y="3" text-anchor="middle" fill="#ededee" font-weight="700">VAN</text>
        <text x="0" y="40" text-anchor="middle" font-size="9" fill="#9b9ba1">Vancouver · BCCH</text>
      </g>
      <g transform="translate(-280,0)">
        <circle cx="0" cy="0" r="26" fill="#1a1a1d" stroke="#ed1c24"/>
        <text x="0" y="3" text-anchor="middle" fill="#ededee" font-weight="700">YYC</text>
        <text x="0" y="44" text-anchor="middle" font-size="9" fill="#9b9ba1">Calgary · Foothills</text>
      </g>
      <g transform="translate(-220,160)">
        <circle cx="0" cy="0" r="22" fill="#1a1a1d" stroke="#26262a"/>
        <text x="0" y="3" text-anchor="middle" fill="#ededee" font-weight="700">YEG</text>
        <text x="0" y="40" text-anchor="middle" font-size="9" fill="#9b9ba1">Edmonton · UofA</text>
      </g>
      <g transform="translate(0,-200)">
        <circle cx="0" cy="0" r="26" fill="#1a1a1d" stroke="#ed1c24"/>
        <text x="0" y="3" text-anchor="middle" fill="#ededee" font-weight="700">YYZ</text>
        <text x="0" y="-32" text-anchor="middle" font-size="9" fill="#9b9ba1">Toronto · UHN / SickKids</text>
      </g>
      <g transform="translate(180,-180)">
        <circle cx="0" cy="0" r="22" fill="#1a1a1d" stroke="#26262a"/>
        <text x="0" y="3" text-anchor="middle" fill="#ededee" font-weight="700">YOW</text>
        <text x="0" y="-32" text-anchor="middle" font-size="9" fill="#9b9ba1">Ottawa · Civic</text>
      </g>
      <g transform="translate(280,-30)">
        <circle cx="0" cy="0" r="22" fill="#1a1a1d" stroke="#26262a"/>
        <text x="0" y="3" text-anchor="middle" fill="#ededee" font-weight="700">YUL</text>
        <text x="0" y="40" text-anchor="middle" font-size="9" fill="#9b9ba1">Montréal · MUHC</text>
      </g>
      <g transform="translate(240,140)">
        <circle cx="0" cy="0" r="22" fill="#1a1a1d" stroke="#26262a"/>
        <text x="0" y="3" text-anchor="middle" fill="#ededee" font-weight="700">YHZ</text>
        <text x="0" y="40" text-anchor="middle" font-size="9" fill="#9b9ba1">Halifax · QEII</text>
      </g>
      <g transform="translate(0,200)">
        <circle cx="0" cy="0" r="22" fill="#1a1a1d" stroke="#26262a"/>
        <text x="0" y="3" text-anchor="middle" fill="#ededee" font-weight="700">YYT</text>
        <text x="0" y="40" text-anchor="middle" font-size="9" fill="#9b9ba1">St. John's · MUN</text>
      </g>
      <g transform="translate(-100,200)">
        <circle cx="0" cy="0" r="22" fill="#1a1a1d" stroke="#26262a"/>
        <text x="0" y="3" text-anchor="middle" fill="#ededee" font-weight="700">YQB</text>
        <text x="0" y="40" text-anchor="middle" font-size="9" fill="#9b9ba1">Québec · CHUQ</text>
      </g>
      <g transform="translate(100,200)">
        <circle cx="0" cy="0" r="22" fill="#1a1a1d" stroke="#26262a"/>
        <text x="0" y="3" text-anchor="middle" fill="#ededee" font-weight="700">YWG</text>
        <text x="0" y="40" text-anchor="middle" font-size="9" fill="#9b9ba1">Winnipeg · HSC</text>
      </g>
    </g>
  </g>

  <!-- Legend -->
  <g transform="translate(40,440)" font-family="'Public Sans', sans-serif">
    <circle cx="8" cy="8" r="6" fill="#1a1a1d" stroke="#ed1c24"/>
    <text x="22" y="12" font-size="11" fill="#cfcfd2">Active site</text>
    <circle cx="118" cy="8" r="6" fill="#1a1a1d" stroke="#26262a"/>
    <text x="132" y="12" font-size="11" fill="#cfcfd2">Activating</text>
    <text x="216" y="12" font-size="11" fill="#9b9ba1">10 sites · 218 enrolled · live data sync</text>
  </g>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" role="img" aria-label="MAESTRO AI agent mockup">
  <defs>
    <linearGradient id="ai-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#161618"/>
      <stop offset="100%" stop-color="#0d0d0f"/>
    </linearGradient>
    <linearGradient id="ai-spark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ed1c24"/>
      <stop offset="100%" stop-color="#ff6b6f"/>
    </linearGradient>
    <filter id="ai-shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="14" stdDeviation="22" flood-color="#000" flood-opacity="0.45"/>
    </filter>
    <filter id="ai-glow">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>

  <rect x="20" y="20" width="760" height="460" rx="20" fill="url(#ai-bg)" stroke="#26262a" stroke-width="1" filter="url(#ai-shadow)"/>

  <!-- Top bar -->
  <g transform="translate(20,20)">
    <rect width="760" height="44" rx="20" fill="#0e0e10"/>
    <circle cx="22" cy="22" r="4" fill="#ed1c24"/>
    <circle cx="38" cy="22" r="4" fill="#3a3a40"/>
    <circle cx="54" cy="22" r="4" fill="#3a3a40"/>
    <text x="380" y="27" text-anchor="middle" font-family="'Public Sans', sans-serif" font-size="13" fill="#9b9ba1" font-weight="500">maestro.app · MAESTRO Agent</text>
  </g>

  <!-- Sidebar with agents -->
  <g transform="translate(40,90)" font-family="'Public Sans', sans-serif">
    <rect width="180" height="370" rx="14" fill="#1a1a1d"/>
    <text x="20" y="32" font-size="11" font-weight="600" fill="#9b9ba1" letter-spacing="0.08em">AGENTS</text>

    <!-- Active agent -->
    <g transform="translate(14,46)">
      <rect width="152" height="58" rx="10" fill="#ed1c2418"/>
      <circle cx="22" cy="29" r="14" fill="url(#ai-spark)"/>
      <path d="M22 22 l2 5 5 2 -5 2 -2 5 -2 -5 -5 -2 5 -2 z" fill="#fff"/>
      <text x="46" y="26" font-size="13" font-weight="700" fill="#ed1c24">Protocol Q&amp;A</text>
      <text x="46" y="42" font-size="10" fill="#cfcfd2">retrieves &amp; cites SOPs</text>
    </g>

    <g transform="translate(14,114)">
      <rect width="152" height="58" rx="10" fill="#0e0e10" stroke="#26262a"/>
      <rect x="8" y="15" width="28" height="28" rx="14" fill="#26262a"/>
      <text x="22" y="35" text-anchor="middle" font-size="13" fill="#ededee" font-weight="700">Q</text>
      <text x="46" y="26" font-size="13" font-weight="600" fill="#ededee">Query Resolver</text>
      <text x="46" y="42" font-size="10" fill="#9b9ba1">87 open queries</text>
    </g>

    <g transform="translate(14,182)">
      <rect width="152" height="58" rx="10" fill="#0e0e10" stroke="#26262a"/>
      <rect x="8" y="15" width="28" height="28" rx="14" fill="#26262a"/>
      <text x="22" y="35" text-anchor="middle" font-size="13" fill="#ededee" font-weight="700">M</text>
      <text x="46" y="26" font-size="13" font-weight="600" fill="#ededee">Monitor briefs</text>
      <text x="46" y="42" font-size="10" fill="#9b9ba1">due tomorrow · 4</text>
    </g>

    <g transform="translate(14,250)">
      <rect width="152" height="58" rx="10" fill="#0e0e10" stroke="#26262a"/>
      <rect x="8" y="15" width="28" height="28" rx="14" fill="#26262a"/>
      <text x="22" y="35" text-anchor="middle" font-size="13" fill="#ededee" font-weight="700">P</text>
      <text x="46" y="26" font-size="12" font-weight="600" fill="#ededee">Pharmacovigilance</text>
      <text x="46" y="42" font-size="10" fill="#9b9ba1">narrative drafter</text>
    </g>

    <g transform="translate(14,318)">
      <rect width="152" height="36" rx="18" fill="none" stroke="#ed1c24" stroke-dasharray="4 4"/>
      <text x="76" y="23" text-anchor="middle" font-size="11" font-weight="600" fill="#ed1c24">+ New agent</text>
    </g>
  </g>

  <!-- Conversation -->
  <g transform="translate(240,90)" font-family="'Public Sans', sans-serif">
    <rect width="520" height="370" rx="14" fill="#1a1a1d"/>

    <!-- User message -->
    <g transform="translate(24,28)">
      <rect width="380" height="36" rx="12" fill="#26262a"/>
      <text x="18" y="23" font-size="13" fill="#ededee">What's the visit window for V4 in protocol v3.1?</text>
    </g>

    <!-- AI message -->
    <g transform="translate(24,80)">
      <circle cx="14" cy="14" r="14" fill="url(#ai-spark)"/>
      <path d="M14 7 l2 5 5 2 -5 2 -2 5 -2 -5 -5 -2 5 -2 z" fill="#fff"/>
      <text x="38" y="14" font-size="11" fill="#ed1c24" font-weight="700" letter-spacing="0.06em">MAESTRO AGENT</text>
      <text x="38" y="32" font-size="13" fill="#ededee">V4 must occur 84 ± 7 days post randomization.</text>

      <!-- Citation card -->
      <g transform="translate(38,46)">
        <rect width="438" height="58" rx="10" fill="#0e0e10" stroke="#26262a"/>
        <rect x="14" y="14" width="22" height="28" rx="3" fill="#ed1c24" opacity="0.18"/>
        <path d="M19 18 v18 m0 -18 h12 m-12 6 h10 m-10 6 h8" stroke="#ed1c24" stroke-width="1.4" stroke-linecap="round" fill="none"/>
        <text x="48" y="28" font-size="12" font-weight="600" fill="#ededee">Protocol amendment 03 · §6.4 Schedule of Assessments</text>
        <text x="48" y="46" font-size="11" fill="#9b9ba1">Source · ONCO-2025-014/Protocols/v3.1.pdf · page 24</text>
      </g>

      <text x="38" y="124" font-size="13" fill="#ededee">
        <tspan x="38" dy="0">Subject 042-018 sits at day 86 — within window.</tspan>
        <tspan x="38" dy="18">I drafted an outreach to Site 042 for Friday.</tspan>
      </text>

      <!-- Action buttons -->
      <g transform="translate(38,162)">
        <rect width="138" height="32" rx="16" fill="#ed1c24"/>
        <text x="69" y="21" text-anchor="middle" font-size="12" fill="#fff" font-weight="600">Send to coordinator</text>

        <g transform="translate(150,0)">
          <rect width="106" height="32" rx="16" fill="none" stroke="#3a3a40"/>
          <text x="53" y="21" text-anchor="middle" font-size="12" fill="#ededee" font-weight="600">Edit draft</text>
        </g>

        <g transform="translate(268,0)">
          <rect width="86" height="32" rx="16" fill="none" stroke="#3a3a40"/>
          <text x="43" y="21" text-anchor="middle" font-size="12" fill="#ededee" font-weight="600">Audit log</text>
        </g>
      </g>
    </g>

    <!-- Composer -->
    <g transform="translate(24,300)">
      <rect width="472" height="46" rx="23" fill="#0e0e10" stroke="#26262a"/>
      <text x="22" y="29" font-size="13" fill="#5a5a62">Ask anything about ONCO-2025-014…</text>
      <circle cx="446" cy="23" r="14" fill="#ed1c24"/>
      <path d="M440 17 l9 6 -9 6 v-12 z" fill="#fff"/>
    </g>
  </g>
</svg>

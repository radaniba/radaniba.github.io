<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" role="img" aria-label="eTMF document tree mockup">
  <defs>
    <linearGradient id="etmf-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#161618"/>
      <stop offset="100%" stop-color="#0d0d0f"/>
    </linearGradient>
    <filter id="etmf-shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="14" stdDeviation="22" flood-color="#000" flood-opacity="0.45"/>
    </filter>
  </defs>

  <rect x="20" y="20" width="760" height="460" rx="20" fill="url(#etmf-bg)" stroke="#26262a" stroke-width="1" filter="url(#etmf-shadow)"/>

  <!-- Top bar -->
  <g transform="translate(20,20)">
    <rect width="760" height="44" rx="20" fill="#0e0e10"/>
    <circle cx="22" cy="22" r="4" fill="#ed1c24"/>
    <circle cx="38" cy="22" r="4" fill="#3a3a40"/>
    <circle cx="54" cy="22" r="4" fill="#3a3a40"/>
    <text x="380" y="27" text-anchor="middle" font-family="'Public Sans', sans-serif" font-size="13" fill="#9b9ba1" font-weight="500">maestro.app · eTMF · ONCO-2025-014</text>
  </g>

  <!-- Folder tree -->
  <g transform="translate(40,90)" font-family="'Public Sans', sans-serif">
    <rect width="280" height="370" rx="14" fill="#1a1a1d"/>
    <g transform="translate(18,28)">
      <text x="0" y="0" font-size="11" font-weight="600" fill="#9b9ba1" letter-spacing="0.08em">DIA REFERENCE MODEL</text>
    </g>

    <!-- Tree items -->
    <g transform="translate(18,52)" font-size="13" fill="#cfcfd2">
      <!-- Zone 1 expanded -->
      <g transform="translate(0,0)">
        <path d="M0 4 l5 4 -5 4z" fill="#9b9ba1"/>
        <text x="14" y="12" fill="#ededee" font-weight="600">01 Trial Management</text>
        <text x="240" y="12" text-anchor="end" font-size="11" fill="#9b9ba1">42</text>
      </g>
      <g transform="translate(20,28)">
        <path d="M0 8 h6 v-4 l5 4 -5 4 v-4" fill="#9b9ba1"/>
        <text x="18" y="12" fill="#ededee" font-weight="600">02 Central Trial Documents</text>
        <text x="220" y="12" text-anchor="end" font-size="11" fill="#9b9ba1">86</text>
      </g>
      <!-- Zone 2 with sub items -->
      <g transform="translate(40,52)" font-size="12">
        <text x="0" y="12">Investigator's Brochure v4.0</text>
        <rect x="200" y="2" width="44" height="14" rx="7" fill="#1f5c3a"/>
        <text x="222" y="12" text-anchor="middle" font-size="10" font-weight="600" fill="#a7e1bd">FINAL</text>
      </g>
      <g transform="translate(40,76)" font-size="12">
        <text x="0" y="12">Protocol Amendment 03</text>
        <rect x="200" y="2" width="44" height="14" rx="7" fill="#5c481f"/>
        <text x="222" y="12" text-anchor="middle" font-size="10" font-weight="600" fill="#ffd789">DRAFT</text>
      </g>
      <g transform="translate(40,100)" font-size="12">
        <text x="0" y="12">Informed Consent EN/FR</text>
        <rect x="200" y="2" width="44" height="14" rx="7" fill="#1f5c3a"/>
        <text x="222" y="12" text-anchor="middle" font-size="10" font-weight="600" fill="#a7e1bd">FINAL</text>
      </g>
      <g transform="translate(40,124)" font-size="12">
        <text x="0" y="12">Sample CRF Booklet</text>
        <rect x="200" y="2" width="44" height="14" rx="7" fill="#1f5c3a"/>
        <text x="222" y="12" text-anchor="middle" font-size="10" font-weight="600" fill="#a7e1bd">FINAL</text>
      </g>

      <g transform="translate(0,160)">
        <path d="M0 4 l5 4 -5 4z" fill="#9b9ba1"/>
        <text x="14" y="12" fill="#ededee" font-weight="600">03 Regulatory</text>
        <text x="240" y="12" text-anchor="end" font-size="11" fill="#9b9ba1">214</text>
      </g>
      <g transform="translate(0,188)">
        <path d="M0 4 l5 4 -5 4z" fill="#9b9ba1"/>
        <text x="14" y="12" fill="#ededee" font-weight="600">04 IRB / IEC</text>
        <text x="240" y="12" text-anchor="end" font-size="11" fill="#9b9ba1">68</text>
      </g>
      <g transform="translate(0,216)">
        <path d="M0 4 l5 4 -5 4z" fill="#9b9ba1"/>
        <text x="14" y="12" fill="#ededee" font-weight="600">05 Site Management</text>
        <text x="240" y="12" text-anchor="end" font-size="11" fill="#9b9ba1">312</text>
      </g>
    </g>

    <!-- Status footer -->
    <g transform="translate(18,322)">
      <text x="0" y="0" font-size="11" fill="#9b9ba1">Inspection-readiness</text>
      <text x="244" y="0" text-anchor="end" font-size="11" fill="#ededee" font-weight="600">98%</text>
      <rect x="0" y="8" width="244" height="6" rx="3" fill="#26262a"/>
      <rect x="0" y="8" width="239" height="6" rx="3" fill="#ed1c24"/>
    </g>
  </g>

  <!-- Document preview -->
  <g transform="translate(340,90)" font-family="'Public Sans', sans-serif">
    <rect width="420" height="370" rx="14" fill="#1a1a1d"/>

    <!-- Doc header -->
    <g transform="translate(24,24)">
      <text x="0" y="14" font-size="11" font-weight="600" fill="#9b9ba1" letter-spacing="0.08em">PROTOCOL AMENDMENT 03</text>
      <text x="0" y="40" font-size="18" font-weight="700" fill="#ededee">Phase II — ONCO-2025-014</text>
      <g transform="translate(0,52)" font-size="11" fill="#9b9ba1">
        <text x="0" y="14">Owner · A. Petrov</text>
        <text x="120" y="14">Version · 3.1</text>
        <text x="220" y="14">Modified · 2 days ago</text>
      </g>
    </g>

    <!-- Faux document body -->
    <g transform="translate(24,108)" fill="#26262a">
      <rect x="0"  y="0"  width="372" height="6" rx="3"/>
      <rect x="0"  y="14" width="320" height="6" rx="3"/>
      <rect x="0"  y="28" width="356" height="6" rx="3"/>
      <rect x="0"  y="42" width="280" height="6" rx="3"/>
      <rect x="0"  y="64" width="372" height="6" rx="3"/>
      <rect x="0"  y="78" width="340" height="6" rx="3"/>
      <rect x="0"  y="92" width="300" height="6" rx="3"/>
    </g>

    <!-- Signatures panel -->
    <g transform="translate(24,232)">
      <rect width="372" height="116" rx="12" fill="#0e0e10" stroke="#26262a"/>
      <text x="20" y="26" font-size="11" fill="#9b9ba1" letter-spacing="0.06em">21 CFR PART 11 SIGNATURES</text>

      <g transform="translate(20,40)">
        <circle cx="10" cy="14" r="10" fill="#ed1c24"/>
        <text x="10" y="18" text-anchor="middle" font-size="10" font-weight="700" fill="#fff">AP</text>
        <text x="30" y="14" font-size="12" font-weight="600" fill="#ededee">Anton Petrov</text>
        <text x="30" y="28" font-size="10" fill="#9b9ba1">Sponsor PI · signed Apr 18, 2026 14:02 UTC</text>
      </g>
      <g transform="translate(20,76)">
        <circle cx="10" cy="14" r="10" fill="#3a3a40"/>
        <text x="10" y="18" text-anchor="middle" font-size="10" font-weight="700" fill="#fff">SK</text>
        <text x="30" y="14" font-size="12" font-weight="600" fill="#ededee">Sara Kim</text>
        <text x="30" y="28" font-size="10" fill="#9b9ba1">QA · awaiting signature</text>
      </g>
    </g>
  </g>
</svg>

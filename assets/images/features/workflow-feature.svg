<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" role="img" aria-label="Visual workflow builder mockup">
  <defs>
    <linearGradient id="wf-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#161618"/>
      <stop offset="100%" stop-color="#0d0d0f"/>
    </linearGradient>
    <pattern id="wf-grid" width="24" height="24" patternUnits="userSpaceOnUse">
      <path d="M24 0H0V24" fill="none" stroke="#1f1f23" stroke-width="1"/>
    </pattern>
    <filter id="wf-shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="14" stdDeviation="22" flood-color="#000" flood-opacity="0.45"/>
    </filter>
    <marker id="wf-arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0 0 L10 5 L0 10 z" fill="#5a5a62"/>
    </marker>
  </defs>

  <rect x="20" y="20" width="760" height="460" rx="20" fill="url(#wf-bg)" stroke="#26262a" stroke-width="1" filter="url(#wf-shadow)"/>

  <!-- Top bar -->
  <g transform="translate(20,20)">
    <rect width="760" height="44" rx="20" fill="#0e0e10"/>
    <circle cx="22" cy="22" r="4" fill="#ed1c24"/>
    <circle cx="38" cy="22" r="4" fill="#3a3a40"/>
    <circle cx="54" cy="22" r="4" fill="#3a3a40"/>
    <text x="380" y="27" text-anchor="middle" font-family="'Public Sans', sans-serif" font-size="13" fill="#9b9ba1" font-weight="500">maestro.app · Workflow Builder · "SAE Reporting"</text>
  </g>

  <!-- Canvas with grid -->
  <g transform="translate(40,90)">
    <rect width="720" height="370" rx="14" fill="#101012"/>
    <rect width="720" height="370" rx="14" fill="url(#wf-grid)"/>

    <!-- Connections -->
    <g fill="none" stroke="#5a5a62" stroke-width="1.6">
      <path d="M120 90 H 240" marker-end="url(#wf-arrow)"/>
      <path d="M340 90 H 460" marker-end="url(#wf-arrow)"/>
      <path d="M560 90 V 200 H 660" marker-end="url(#wf-arrow)"/>
      <path d="M540 110 V 220 H 460" marker-end="url(#wf-arrow)"/>
      <path d="M260 130 V 250 H 320" marker-end="url(#wf-arrow)"/>
    </g>

    <!-- Node: Trigger -->
    <g transform="translate(20,55)" font-family="'Public Sans', sans-serif">
      <rect width="100" height="70" rx="12" fill="#ed1c24"/>
      <text x="50" y="26" text-anchor="middle" font-size="10" font-weight="700" fill="#fff" letter-spacing="0.08em">TRIGGER</text>
      <text x="50" y="46" text-anchor="middle" font-size="13" font-weight="600" fill="#fff">SAE form</text>
      <text x="50" y="60" text-anchor="middle" font-size="10" fill="#fff" opacity="0.8">submitted</text>
    </g>

    <!-- Node: Validate -->
    <g transform="translate(240,55)" font-family="'Public Sans', sans-serif">
      <rect width="100" height="70" rx="12" fill="#1a1a1d" stroke="#26262a"/>
      <text x="50" y="26" text-anchor="middle" font-size="10" font-weight="700" fill="#9b9ba1" letter-spacing="0.08em">RULE</text>
      <text x="50" y="46" text-anchor="middle" font-size="13" font-weight="600" fill="#ededee">Validate</text>
      <text x="50" y="60" text-anchor="middle" font-size="10" fill="#9b9ba1">required fields</text>
    </g>

    <!-- Node: Sponsor notify -->
    <g transform="translate(460,55)" font-family="'Public Sans', sans-serif">
      <rect width="100" height="70" rx="12" fill="#1a1a1d" stroke="#26262a"/>
      <text x="50" y="26" text-anchor="middle" font-size="10" font-weight="700" fill="#9b9ba1" letter-spacing="0.08em">NOTIFY</text>
      <text x="50" y="46" text-anchor="middle" font-size="13" font-weight="600" fill="#ededee">Sponsor</text>
      <text x="50" y="60" text-anchor="middle" font-size="10" fill="#9b9ba1">PV team email</text>
    </g>

    <!-- Node: Health Canada -->
    <g transform="translate(660,180)" font-family="'Public Sans', sans-serif">
      <rect width="120" height="70" rx="12" fill="#1a1a1d" stroke="#ed1c24" stroke-width="1.6"/>
      <text x="60" y="26" text-anchor="middle" font-size="10" font-weight="700" fill="#ed1c24" letter-spacing="0.08em">SUBMIT</text>
      <text x="60" y="46" text-anchor="middle" font-size="13" font-weight="600" fill="#ededee">Health Canada</text>
      <text x="60" y="60" text-anchor="middle" font-size="10" fill="#9b9ba1">CIOMS within 7d</text>
    </g>

    <!-- Node: Site monitor task -->
    <g transform="translate(460,200)" font-family="'Public Sans', sans-serif">
      <rect width="100" height="70" rx="12" fill="#1a1a1d" stroke="#26262a"/>
      <text x="50" y="26" text-anchor="middle" font-size="10" font-weight="700" fill="#9b9ba1" letter-spacing="0.08em">TASK</text>
      <text x="50" y="46" text-anchor="middle" font-size="13" font-weight="600" fill="#ededee">CRA review</text>
      <text x="50" y="60" text-anchor="middle" font-size="10" fill="#9b9ba1">SLA · 24h</text>
    </g>

    <!-- Node: Audit log -->
    <g transform="translate(320,235)" font-family="'Public Sans', sans-serif">
      <rect width="100" height="70" rx="12" fill="#1a1a1d" stroke="#26262a"/>
      <text x="50" y="26" text-anchor="middle" font-size="10" font-weight="700" fill="#9b9ba1" letter-spacing="0.08em">LOG</text>
      <text x="50" y="46" text-anchor="middle" font-size="13" font-weight="600" fill="#ededee">Audit trail</text>
      <text x="50" y="60" text-anchor="middle" font-size="10" fill="#9b9ba1">21 CFR Part 11</text>
    </g>

    <!-- Status pill -->
    <g transform="translate(20,316)" font-family="'Public Sans', sans-serif">
      <rect width="320" height="34" rx="17" fill="#0e0e10" stroke="#26262a"/>
      <circle cx="20" cy="17" r="5" fill="#ed1c24"/>
      <text x="36" y="22" font-size="12" fill="#ededee" font-weight="600">Active · 1,402 runs this month · 0 failures</text>
    </g>
  </g>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" role="img" aria-label="QMS deviations and CAPA mockup">
  <defs>
    <linearGradient id="qms-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#161618"/>
      <stop offset="100%" stop-color="#0d0d0f"/>
    </linearGradient>
    <filter id="qms-shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="14" stdDeviation="22" flood-color="#000" flood-opacity="0.45"/>
    </filter>
  </defs>

  <rect x="20" y="20" width="760" height="460" rx="20" fill="url(#qms-bg)" stroke="#26262a" stroke-width="1" filter="url(#qms-shadow)"/>

  <!-- Top bar -->
  <g transform="translate(20,20)">
    <rect width="760" height="44" rx="20" fill="#0e0e10"/>
    <circle cx="22" cy="22" r="4" fill="#ed1c24"/>
    <circle cx="38" cy="22" r="4" fill="#3a3a40"/>
    <circle cx="54" cy="22" r="4" fill="#3a3a40"/>
    <text x="380" y="27" text-anchor="middle" font-family="'Public Sans', sans-serif" font-size="13" fill="#9b9ba1" font-weight="500">maestro.app · QMS · Deviations &amp; CAPA</text>
  </g>

  <!-- KPI strip -->
  <g transform="translate(40,90)" font-family="'Public Sans', sans-serif">
    <g>
      <rect width="172" height="74" rx="14" fill="#1a1a1d"/>
      <text x="20" y="26" font-size="11" fill="#9b9ba1" letter-spacing="0.06em">OPEN DEVIATIONS</text>
      <text x="20" y="58" font-size="26" font-weight="700" fill="#ededee">23</text>
      <text x="100" y="58" font-size="11" fill="#7da580">▼ 14% MoM</text>
    </g>
    <g transform="translate(184,0)">
      <rect width="172" height="74" rx="14" fill="#1a1a1d"/>
      <text x="20" y="26" font-size="11" fill="#9b9ba1" letter-spacing="0.06em">CAPA OVERDUE</text>
      <text x="20" y="58" font-size="26" font-weight="700" fill="#ed1c24">3</text>
      <text x="100" y="58" font-size="11" fill="#9b9ba1">target · 0</text>
    </g>
    <g transform="translate(368,0)">
      <rect width="172" height="74" rx="14" fill="#1a1a1d"/>
      <text x="20" y="26" font-size="11" fill="#9b9ba1" letter-spacing="0.06em">AVG CYCLE TIME</text>
      <text x="20" y="58" font-size="26" font-weight="700" fill="#ededee">11d</text>
      <text x="100" y="58" font-size="11" fill="#7da580">▼ 4d</text>
    </g>
    <g transform="translate(552,0)">
      <rect width="168" height="74" rx="14" fill="#1a1a1d"/>
      <text x="20" y="26" font-size="11" fill="#9b9ba1" letter-spacing="0.06em">EFFECTIVENESS</text>
      <text x="20" y="58" font-size="26" font-weight="700" fill="#ededee">96%</text>
      <text x="100" y="58" font-size="11" fill="#7da580">▲ 2.1</text>
    </g>
  </g>

  <!-- Deviations table -->
  <g transform="translate(40,182)" font-family="'Public Sans', sans-serif">
    <rect width="540" height="278" rx="14" fill="#1a1a1d"/>
    <text x="22" y="32" font-size="14" font-weight="700" fill="#ededee">Active deviations</text>
    <text x="518" y="32" text-anchor="end" font-size="11" fill="#9b9ba1">sorted by risk</text>

    <!-- Table header -->
    <g transform="translate(22,52)" font-size="10" fill="#9b9ba1" letter-spacing="0.06em">
      <text x="0" y="14">ID</text>
      <text x="60" y="14">SUMMARY</text>
      <text x="320" y="14">RISK</text>
      <text x="400" y="14">OWNER</text>
      <text x="496" y="14" text-anchor="end">DUE</text>
    </g>
    <line x1="22" y1="74" x2="518" y2="74" stroke="#26262a"/>

    <!-- Rows -->
    <g transform="translate(22,86)" font-family="'Public Sans', sans-serif" font-size="12" fill="#cfcfd2">
      <g>
        <text x="0" y="14" fill="#ededee" font-weight="600">DV-218</text>
        <text x="60" y="14">Missed visit window — Site 042</text>
        <rect x="320" y="2" width="50" height="16" rx="8" fill="#ed1c24"/>
        <text x="345" y="13" text-anchor="middle" font-size="10" font-weight="700" fill="#fff">HIGH</text>
        <text x="400" y="14">M. Tan</text>
        <text x="496" y="14" text-anchor="end" fill="#ed1c24" font-weight="600">overdue</text>
      </g>
      <g transform="translate(0,32)">
        <text x="0" y="14" fill="#ededee" font-weight="600">DV-217</text>
        <text x="60" y="14">Temperature excursion — IP storage</text>
        <rect x="320" y="2" width="50" height="16" rx="8" fill="#ed1c24"/>
        <text x="345" y="13" text-anchor="middle" font-size="10" font-weight="700" fill="#fff">HIGH</text>
        <text x="400" y="14">L. Garcia</text>
        <text x="496" y="14" text-anchor="end" fill="#9b9ba1">in 2 days</text>
      </g>
      <g transform="translate(0,64)">
        <text x="0" y="14" fill="#ededee" font-weight="600">DV-215</text>
        <text x="60" y="14">Lab kit shipped to wrong site</text>
        <rect x="320" y="2" width="50" height="16" rx="8" fill="#5c481f"/>
        <text x="345" y="13" text-anchor="middle" font-size="10" font-weight="700" fill="#ffd789">MED</text>
        <text x="400" y="14">A. Petrov</text>
        <text x="496" y="14" text-anchor="end" fill="#9b9ba1">in 6 days</text>
      </g>
      <g transform="translate(0,96)">
        <text x="0" y="14" fill="#ededee" font-weight="600">DV-211</text>
        <text x="60" y="14">eSource entry transcription mismatch</text>
        <rect x="320" y="2" width="50" height="16" rx="8" fill="#5c481f"/>
        <text x="345" y="13" text-anchor="middle" font-size="10" font-weight="700" fill="#ffd789">MED</text>
        <text x="400" y="14">S. Kim</text>
        <text x="496" y="14" text-anchor="end" fill="#9b9ba1">in 8 days</text>
      </g>
      <g transform="translate(0,128)">
        <text x="0" y="14" fill="#ededee" font-weight="600">DV-209</text>
        <text x="60" y="14">eConsent re-signature pending</text>
        <rect x="320" y="2" width="50" height="16" rx="8" fill="#1f5c3a"/>
        <text x="345" y="13" text-anchor="middle" font-size="10" font-weight="700" fill="#a7e1bd">LOW</text>
        <text x="400" y="14">J. Brown</text>
        <text x="496" y="14" text-anchor="end" fill="#9b9ba1">in 14 days</text>
      </g>
      <g transform="translate(0,160)">
        <text x="0" y="14" fill="#ededee" font-weight="600">DV-204</text>
        <text x="60" y="14">Monitoring report pending sign-off</text>
        <rect x="320" y="2" width="50" height="16" rx="8" fill="#1f5c3a"/>
        <text x="345" y="13" text-anchor="middle" font-size="10" font-weight="700" fill="#a7e1bd">LOW</text>
        <text x="400" y="14">R. Singh</text>
        <text x="496" y="14" text-anchor="end" fill="#9b9ba1">in 21 days</text>
      </g>
    </g>
  </g>

  <!-- CAPA workflow side card -->
  <g transform="translate(596,182)" font-family="'Public Sans', sans-serif">
    <rect width="164" height="278" rx="14" fill="#1a1a1d"/>
    <text x="20" y="32" font-size="13" font-weight="700" fill="#ededee">CAPA workflow</text>
    <text x="20" y="50" font-size="11" fill="#9b9ba1">DV-218</text>

    <!-- Steps -->
    <g transform="translate(20,76)">
      <circle cx="10" cy="10" r="10" fill="#ed1c24"/>
      <path d="m6 10 3 3 5-5" stroke="#fff" stroke-width="1.6" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="30" y="14" font-size="12" fill="#ededee" font-weight="600">Detected</text>
    </g>
    <line x1="30" y1="92" x2="30" y2="120" stroke="#26262a" stroke-width="2"/>

    <g transform="translate(20,128)">
      <circle cx="10" cy="10" r="10" fill="#ed1c24"/>
      <path d="m6 10 3 3 5-5" stroke="#fff" stroke-width="1.6" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="30" y="14" font-size="12" fill="#ededee" font-weight="600">Root cause</text>
    </g>
    <line x1="30" y1="144" x2="30" y2="172" stroke="#26262a" stroke-width="2"/>

    <g transform="translate(20,180)">
      <circle cx="10" cy="10" r="10" fill="#ed1c24" opacity="0.35"/>
      <circle cx="10" cy="10" r="3" fill="#ed1c24"/>
      <text x="30" y="14" font-size="12" fill="#ededee" font-weight="600">Action plan</text>
      <text x="30" y="28" font-size="10" fill="#9b9ba1">in review</text>
    </g>
    <line x1="30" y1="210" x2="30" y2="234" stroke="#26262a" stroke-width="2" stroke-dasharray="2 4"/>

    <g transform="translate(20,242)">
      <circle cx="10" cy="10" r="10" fill="none" stroke="#3a3a40" stroke-width="1.6"/>
      <text x="30" y="14" font-size="12" fill="#9b9ba1">Effectiveness</text>
    </g>

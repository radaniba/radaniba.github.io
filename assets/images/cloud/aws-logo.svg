<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 110 44" role="img" aria-label="Amazon Web Services">
  <!-- 'aws' wordmark, very heavy weight to mimic the canonical AWS logotype -->
  <text x="0" y="24"
        fill="currentColor"
        font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="24"
        font-weight="900"
        letter-spacing="-0.05em">aws</text>
  <!-- Iconic smile arc with arrowhead, sweeping under the wordmark from below 'a' to past 's' -->
  <g fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round">
    <path d="M2 34 C 14 41, 32 41, 44 34"/>
    <path d="M40 31 L44.5 34 L40.5 37"/>
  </g>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 44" role="img" aria-label="DigitalOcean">
  <!-- Refined DO mark: outer disc with concentric circular cutout forming a ring,
       plus an inner cutout forming the 'O' inside the 'D'. Drawn as one path with
       even-odd fill so the cutouts subtract cleanly. -->
  <g fill="currentColor" fill-rule="evenodd" clip-rule="evenodd">
    <path d="
      M22 4
      a18 18 0 1 1 -18 18
      a18 18 0 0 1 18 -18
      Z
      M22 11
      a11 11 0 1 0 11 11
      h-7
      a4 4 0 1 1 -4 -4
      Z
    "/>
  </g>
  <!-- Wordmark -->
  <text x="48" y="29"
        fill="currentColor"
        font-family="'Helvetica Neue', 'Public Sans', sans-serif"
        font-size="20"
        font-weight="500"
        letter-spacing="-0.005em">DigitalOcean</text>
</svg>

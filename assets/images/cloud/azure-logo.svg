<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 44" role="img" aria-label="Microsoft Azure">
  <!-- Microsoft 4-tile mark (slight asymmetric opacity to suggest the multi-color original in monochrome) -->
  <g fill="currentColor">
    <rect x="0"  y="6"  width="14" height="14"/>
    <rect x="16" y="6"  width="14" height="14" opacity="0.78"/>
    <rect x="0"  y="22" width="14" height="14" opacity="0.78"/>
    <rect x="16" y="22" width="14" height="14" opacity="0.55"/>
  </g>
  <!-- Wordmark with proper breathing room so 'Azure' is never truncated -->
  <text x="38" y="29"
        fill="currentColor"
        font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
        font-size="20"
        font-weight="600"
        letter-spacing="-0.005em">Microsoft Azure</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 150 44" role="img" aria-label="Oracle">
  <!-- ORACLE wordmark in heavy condensed weight — the canonical brand uses a custom typeface
       close to Helvetica Black Condensed; Helvetica Neue Black with negative tracking is the
       safest universally-installed approximation. -->
  <text x="0" y="32"
        fill="currentColor"
        font-family="'Helvetica Neue', 'Arial Narrow', Helvetica, Arial, sans-serif"
        font-size="30"
        font-weight="900"
        font-stretch="condensed"
        letter-spacing="-0.015em">ORACLE</text>
</svg>

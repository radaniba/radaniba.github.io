<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" role="img" aria-label="MAESTRO data integration">
  <defs>
    <linearGradient id="di-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#161618"/>
      <stop offset="100%" stop-color="#0d0d0f"/>
    </linearGradient>
    <linearGradient id="di-pipe" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ed1c24" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#ed1c24" stop-opacity="0.25"/>
    </linearGradient>
    <filter id="di-shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="14" stdDeviation="22" flood-color="#000" flood-opacity="0.45"/>
    </filter>
  </defs>

  <rect x="20" y="20" width="760" height="460" rx="20" fill="url(#di-bg)" stroke="#26262a" stroke-width="1" filter="url(#di-shadow)"/>

  <g font-family="'Public Sans', sans-serif">
    <text x="400" y="62" text-anchor="middle" font-size="14" font-weight="600" fill="#9b9ba1" letter-spacing="0.12em">UNIFIED DATA INTEGRATION</text>

    <!-- Sources column -->
    <g transform="translate(60,100)">
      <text x="0" y="0" font-size="11" fill="#9b9ba1" letter-spacing="0.08em">SOURCES</text>
      <g font-size="12" fill="#ededee" font-weight="600">
        <g transform="translate(0,16)">
          <rect width="180" height="44" rx="10" fill="#1a1a1d" stroke="#26262a"/>
          <rect x="14" y="14" width="16" height="16" rx="3" fill="#ed1c24" opacity="0.18"/>
          <path d="M18 18 v8 m4 -8 v8 m-4 -4 h8" stroke="#ed1c24" stroke-width="1.4"/>
          <text x="40" y="22" fill="#ededee">EDC · CRF data</text>
          <text x="40" y="36" font-size="10" fill="#9b9ba1" font-weight="400">Medidata · Veeva · Castor</text>
        </g>
        <g transform="translate(0,72)">
          <rect width="180" height="44" rx="10" fill="#1a1a1d" stroke="#26262a"/>
          <rect x="14" y="14" width="16" height="16" rx="3" fill="#ed1c24" opacity="0.18"/>
          <path d="M18 30 V18 a4 4 0 0 1 8 0 V30" stroke="#ed1c24" stroke-width="1.4" fill="none"/>
          <text x="40" y="22" fill="#ededee">Lab APIs (HL7 / FHIR)</text>
          <text x="40" y="36" font-size="10" fill="#9b9ba1" font-weight="400">LabCorp · Dynacare · Lifelabs</text>
        </g>
        <g transform="translate(0,128)">
          <rect width="180" height="44" rx="10" fill="#1a1a1d" stroke="#26262a"/>
          <rect x="14" y="14" width="16" height="16" rx="3" fill="#ed1c24" opacity="0.18"/>
          <circle cx="22" cy="22" r="5" fill="none" stroke="#ed1c24" stroke-width="1.4"/>
          <text x="40" y="22" fill="#ededee">ePRO &amp; wearables</text>
          <text x="40" y="36" font-size="10" fill="#9b9ba1" font-weight="400">Apple · Fitbit · Withings</text>
        </g>
        <g transform="translate(0,184)">
          <rect width="180" height="44" rx="10" fill="#1a1a1d" stroke="#26262a"/>
          <rect x="14" y="14" width="16" height="16" rx="3" fill="#ed1c24" opacity="0.18"/>
          <path d="M16 18 h12 v12 h-12 z M19 22 h6 M19 26 h4" stroke="#ed1c24" stroke-width="1.4" fill="none"/>
          <text x="40" y="22" fill="#ededee">EHR / EMR</text>
          <text x="40" y="36" font-size="10" fill="#9b9ba1" font-weight="400">Epic · Cerner · Meditech</text>
        </g>
        <g transform="translate(0,240)">
          <rect width="180" height="44" rx="10" fill="#1a1a1d" stroke="#26262a"/>
          <rect x="14" y="14" width="16" height="16" rx="3" fill="#ed1c24" opacity="0.18"/>
          <path d="M16 30 V18 h12 v12 z M16 22 h12" stroke="#ed1c24" stroke-width="1.4" fill="none"/>
          <text x="40" y="22" fill="#ededee">Sponsor systems</text>
          <text x="40" y="36" font-size="10" fill="#9b9ba1" font-weight="400">CTMS · safety · finance</text>
        </g>
      </g>
    </g>

    <!-- Pipes -->
    <g stroke="url(#di-pipe)" stroke-width="3" fill="none" stroke-linecap="round">
      <path d="M250 138 C 320 138, 320 250, 380 250"/>
      <path d="M250 194 C 320 194, 320 250, 380 250"/>
      <path d="M250 250 H 380"/>
      <path d="M250 306 C 320 306, 320 250, 380 250"/>
      <path d="M250 362 C 320 362, 320 250, 380 250"/>
    </g>

    <!-- Center: MAESTRO core -->
    <g transform="translate(380,170)" font-family="'Public Sans', sans-serif">
      <rect width="180" height="160" rx="16" fill="#1a1a1d" stroke="#ed1c24" stroke-width="1.6"/>
      <rect x="20" y="22" width="140" height="44" rx="10" fill="#ed1c24"/>
      <text x="90" y="42" text-anchor="middle" font-size="11" font-weight="700" fill="#fff" letter-spacing="0.12em">MAESTRO CORE</text>
      <text x="90" y="58" text-anchor="middle" font-size="9" fill="#fff" opacity="0.85">Normalize · validate · audit</text>

      <g font-size="11" fill="#cfcfd2">
        <text x="20" y="86">CDISC SDTM &amp; ADaM</text>
        <text x="20" y="106">FHIR R5 transforms</text>
        <text x="20" y="126">PII vault &amp; tokenization</text>
        <text x="20" y="146">21 CFR Part 11 audit</text>
      </g>
    </g>

    <!-- Pipes out -->
    <g stroke="url(#di-pipe)" stroke-width="3" fill="none" stroke-linecap="round">
      <path d="M560 200 C 600 200, 600 156, 640 156"/>
      <path d="M560 230 H 640"/>
      <path d="M560 260 C 600 260, 600 304, 640 304"/>
      <path d="M560 290 C 600 290, 600 360, 640 360"/>
    </g>

    <!-- Destinations -->
    <g transform="translate(640,100)" font-family="'Public Sans', sans-serif">
      <text x="0" y="0" font-size="11" fill="#9b9ba1" letter-spacing="0.08em">DESTINATIONS</text>
      <g font-size="12" fill="#ededee" font-weight="600">
        <g transform="translate(0,32)">
          <rect width="120" height="48" rx="10" fill="#1a1a1d" stroke="#26262a"/>
          <text x="60" y="22" text-anchor="middle" fill="#ededee">CTMS &amp; eTMF</text>
          <text x="60" y="38" text-anchor="middle" font-size="10" fill="#9b9ba1" font-weight="400">single source of truth</text>
        </g>
        <g transform="translate(0,96)">
          <rect width="120" height="48" rx="10" fill="#1a1a1d" stroke="#26262a"/>
          <text x="60" y="22" text-anchor="middle" fill="#ededee">Reg submissions</text>
          <text x="60" y="38" text-anchor="middle" font-size="10" fill="#9b9ba1" font-weight="400">eCTD · CIOMS</text>
        </g>
        <g transform="translate(0,180)">
          <rect width="120" height="48" rx="10" fill="#1a1a1d" stroke="#26262a"/>
          <text x="60" y="22" text-anchor="middle" fill="#ededee">Analytics &amp; AI</text>
          <text x="60" y="38" text-anchor="middle" font-size="10" fill="#9b9ba1" font-weight="400">RAG · forecasts</text>
        </g>
        <g transform="translate(0,236)">
          <rect width="120" height="48" rx="10" fill="#1a1a1d" stroke="#26262a"/>
          <text x="60" y="22" text-anchor="middle" fill="#ededee">Data lake</text>
          <text x="60" y="38" text-anchor="middle" font-size="10" fill="#9b9ba1" font-weight="400">parquet · S3</text>
        </g>
      </g>
    </g>
  </g>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" role="img" aria-label="MAESTRO platform architecture">
  <defs>
    <linearGradient id="pa-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#161618"/>
      <stop offset="100%" stop-color="#0d0d0f"/>
    </linearGradient>
    <linearGradient id="pa-pill" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ed1c24"/>
      <stop offset="100%" stop-color="#c8121a"/>
    </linearGradient>
    <filter id="pa-shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="14" stdDeviation="22" flood-color="#000" flood-opacity="0.45"/>
    </filter>
    <marker id="pa-arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0 0 L10 5 L0 10 z" fill="#5a5a62"/>
    </marker>
  </defs>

  <rect x="20" y="20" width="760" height="460" rx="20" fill="url(#pa-bg)" stroke="#26262a" stroke-width="1" filter="url(#pa-shadow)"/>

  <g font-family="'Public Sans', sans-serif">
    <!-- Title -->
    <text x="400" y="62" text-anchor="middle" font-size="14" font-weight="600" fill="#9b9ba1" letter-spacing="0.12em">MAESTRO PLATFORM ARCHITECTURE</text>

    <!-- Layer 1 - Users / Channels -->
    <g transform="translate(60,90)">
      <text x="0" y="0" font-size="11" fill="#9b9ba1" letter-spacing="0.08em">USERS &amp; CHANNELS</text>
      <g transform="translate(0,12)">
        <rect width="130" height="56" rx="10" fill="#1a1a1d" stroke="#26262a"/>
        <text x="65" y="24" text-anchor="middle" font-size="12" font-weight="600" fill="#ededee">Sponsors</text>
        <text x="65" y="42" text-anchor="middle" font-size="10" fill="#9b9ba1">Web · API · SSO</text>
      </g>
      <g transform="translate(140,12)">
        <rect width="130" height="56" rx="10" fill="#1a1a1d" stroke="#26262a"/>
        <text x="65" y="24" text-anchor="middle" font-size="12" font-weight="600" fill="#ededee">Sites &amp; CRAs</text>
        <text x="65" y="42" text-anchor="middle" font-size="10" fill="#9b9ba1">eSource · eConsent</text>
      </g>
      <g transform="translate(280,12)">
        <rect width="130" height="56" rx="10" fill="#1a1a1d" stroke="#26262a"/>
        <text x="65" y="24" text-anchor="middle" font-size="12" font-weight="600" fill="#ededee">Subjects</text>
        <text x="65" y="42" text-anchor="middle" font-size="10" fill="#9b9ba1">ePRO · mobile</text>
      </g>
      <g transform="translate(420,12)">
        <rect width="130" height="56" rx="10" fill="#1a1a1d" stroke="#26262a"/>
        <text x="65" y="24" text-anchor="middle" font-size="12" font-weight="600" fill="#ededee">Regulators</text>
        <text x="65" y="42" text-anchor="middle" font-size="10" fill="#9b9ba1">Audit · CIOMS · eCTD</text>
      </g>
      <g transform="translate(560,12)">
        <rect width="120" height="56" rx="10" fill="#1a1a1d" stroke="#26262a"/>
        <text x="60" y="24" text-anchor="middle" font-size="12" font-weight="600" fill="#ededee">Integrations</text>
        <text x="60" y="42" text-anchor="middle" font-size="10" fill="#9b9ba1">Labs · Vendors</text>
      </g>
    </g>

    <!-- Connector arrows down -->
    <g stroke="#5a5a62" stroke-width="1.4" fill="none">
      <path d="M125 162 V 188" marker-end="url(#pa-arrow)"/>
      <path d="M265 162 V 188" marker-end="url(#pa-arrow)"/>
      <path d="M405 162 V 188" marker-end="url(#pa-arrow)"/>
      <path d="M545 162 V 188" marker-end="url(#pa-arrow)"/>
      <path d="M680 162 V 188" marker-end="url(#pa-arrow)"/>
    </g>

    <!-- Layer 2 - API gateway -->
    <g transform="translate(60,196)">
      <rect width="680" height="44" rx="22" fill="url(#pa-pill)"/>
      <text x="340" y="22" text-anchor="middle" font-size="12" fill="#fff" font-weight="700" letter-spacing="0.08em">UNIFIED API GATEWAY · OAUTH 2.1 · RATE-LIMITED · PIPEDA &amp; HIPAA EDGE</text>
      <text x="340" y="36" text-anchor="middle" font-size="10" fill="#fff" opacity="0.9">REST · GraphQL · Webhooks · FHIR R5</text>
    </g>

    <!-- Connector down -->
    <g stroke="#5a5a62" stroke-width="1.4" fill="none">
      <path d="M180 250 V 276" marker-end="url(#pa-arrow)"/>
      <path d="M320 250 V 276" marker-end="url(#pa-arrow)"/>
      <path d="M460 250 V 276" marker-end="url(#pa-arrow)"/>
      <path d="M600 250 V 276" marker-end="url(#pa-arrow)"/>
    </g>

    <!-- Layer 3 - Modules -->
    <g transform="translate(60,284)">
      <text x="0" y="0" font-size="11" fill="#9b9ba1" letter-spacing="0.08em">MAESTRO MODULES</text>
      <g transform="translate(0,12)">
        <rect width="160" height="64" rx="12" fill="#1a1a1d" stroke="#ed1c24"/>
        <text x="80" y="26" text-anchor="middle" font-size="13" font-weight="700" fill="#ededee">CTMS</text>
        <text x="80" y="44" text-anchor="middle" font-size="10" fill="#9b9ba1">Trials · Sites · Visits</text>
        <text x="80" y="58" text-anchor="middle" font-size="10" fill="#9b9ba1">Recruitment · KPIs</text>
      </g>
      <g transform="translate(168,12)">
        <rect width="160" height="64" rx="12" fill="#1a1a1d" stroke="#ed1c24"/>
        <text x="80" y="26" text-anchor="middle" font-size="13" font-weight="700" fill="#ededee">eTMF</text>
        <text x="80" y="44" text-anchor="middle" font-size="10" fill="#9b9ba1">DIA Reference Model</text>
        <text x="80" y="58" text-anchor="middle" font-size="10" fill="#9b9ba1">21 CFR Part 11 e-sig</text>
      </g>
      <g transform="translate(336,12)">
        <rect width="160" height="64" rx="12" fill="#1a1a1d" stroke="#ed1c24"/>
        <text x="80" y="26" text-anchor="middle" font-size="13" font-weight="700" fill="#ededee">QMS</text>
        <text x="80" y="44" text-anchor="middle" font-size="10" fill="#9b9ba1">Deviations · CAPA</text>
        <text x="80" y="58" text-anchor="middle" font-size="10" fill="#9b9ba1">Inspection-ready</text>
      </g>
      <g transform="translate(504,12)">
        <rect width="160" height="64" rx="12" fill="#1a1a1d" stroke="#ed1c24"/>
        <text x="80" y="26" text-anchor="middle" font-size="13" font-weight="700" fill="#ededee">Workflow + AI</text>
        <text x="80" y="44" text-anchor="middle" font-size="10" fill="#9b9ba1">Builder · Agents</text>
        <text x="80" y="58" text-anchor="middle" font-size="10" fill="#9b9ba1">RAG over your SOPs</text>
      </g>
    </g>

    <!-- Connector down -->
    <g stroke="#5a5a62" stroke-width="1.4" fill="none">
      <path d="M180 360 V 386" marker-end="url(#pa-arrow)"/>
      <path d="M320 360 V 386" marker-end="url(#pa-arrow)"/>
      <path d="M460 360 V 386" marker-end="url(#pa-arrow)"/>
      <path d="M600 360 V 386" marker-end="url(#pa-arrow)"/>
    </g>

    <!-- Layer 4 - Platform services -->
    <g transform="translate(60,394)">
      <rect width="680" height="56" rx="14" fill="#0e0e10" stroke="#26262a"/>
      <g font-size="11" fill="#cfcfd2">
        <text x="68" y="26" text-anchor="middle">Identity &amp; Access</text>
        <text x="68" y="40" text-anchor="middle" fill="#9b9ba1" font-size="9">SSO · MFA · SCIM</text>

        <text x="206" y="26" text-anchor="middle">Audit &amp; eSig</text>
        <text x="206" y="40" text-anchor="middle" fill="#9b9ba1" font-size="9">21 CFR · Annex 11</text>

        <text x="340" y="26" text-anchor="middle">Data &amp; Storage</text>
        <text x="340" y="40" text-anchor="middle" fill="#9b9ba1" font-size="9">PII vault · WORM · backups</text>

        <text x="478" y="26" text-anchor="middle">Observability</text>
        <text x="478" y="40" text-anchor="middle" fill="#9b9ba1" font-size="9">Logs · metrics · alerts</text>

        <text x="612" y="26" text-anchor="middle">Cloud (multi-region)</text>
        <text x="612" y="40" text-anchor="middle" fill="#9b9ba1" font-size="9">AWS · Azure · GCP · OCI</text>
      </g>

      <!-- Vertical separators -->
      <g stroke="#26262a">
        <line x1="136" y1="12" x2="136" y2="44"/>
        <line x1="272" y1="12" x2="272" y2="44"/>
        <line x1="408" y1="12" x2="408" y2="44"/>
        <line x1="544" y1="12" x2="544" y2="44"/>
      </g>
    </g>
  </g>
</svg>
